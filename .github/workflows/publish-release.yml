name: Publish release

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Run ID containing the Windows installers artifact
        required: true
        type: string
      tag:
        description: Release tag
        required: true
        default: v1.0.0
        type: string

permissions:
  actions: read
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Download Windows installers
        uses: actions/download-artifact@v5
        with:
          name: camunda-support-windows-1.0.0
          path: dist/windows
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      - name: Create checksums
        shell: bash
        run: |
          cd dist/windows
          find . -type f \( -name '*.msi' -o -name '*.exe' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag }}
        shell: bash
        run: |
          mapfile -d '' assets < <(
            find dist/windows -type f \( -name '*.msi' -o -name '*.exe' \) -print0
          )
          assets+=("dist/windows/SHA256SUMS.txt")

          gh release create "$RELEASE_TAG" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Camunda Support 1.0.0" \
            --notes "Windows x64 installers. Packages are unsigned, so Windows SmartScreen may show a warning on first launch."
