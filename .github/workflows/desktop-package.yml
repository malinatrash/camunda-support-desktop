name: Desktop installers

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: desktop-installers-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows:
    name: Windows MSI and EXE
    runs-on: windows-2022
    timeout-minutes: 35

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build MSI and EXE
        shell: pwsh
        run: .\scripts\build-windows.ps1

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: camunda-support-windows-${{ github.run_id }}
          path: |
            composeApp/build/compose/binaries/main/msi/*.msi
            composeApp/build/compose/binaries/main/exe/*.exe
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS ARM64 DMG
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build DMG
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :composeApp:desktopTest :composeApp:packageDmg --stacktrace

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: camunda-support-macos-arm64-${{ github.run_id }}
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error
          retention-days: 14

  linux:
    name: Ubuntu x64 DEB
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - name: Check out sources
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install packaging tools
        shell: bash
        run: sudo apt-get update && sudo apt-get install --yes fakeroot

      - name: Build DEB
        shell: bash
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :composeApp:desktopTest :composeApp:packageDeb --stacktrace

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: camunda-support-linux-x64-${{ github.run_id }}
          path: composeApp/build/compose/binaries/main/deb/*.deb
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - windows
      - macos
      - linux
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write

    steps:
      - name: Download installers
        uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Create checksums
        shell: bash
        run: |
          cd dist
          while IFS= read -r -d '' file; do
            directory="$(dirname "$file")"
            name="$(basename "$file")"
            normalized="${name// /.}"
            if [[ "$name" != "$normalized" ]]; then
              mv "$file" "$directory/$normalized"
            fi
          done < <(find . -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.deb' \) -print0)

          find . -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.deb' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          mapfile -d '' assets < <(
            find dist -type f \( -name '*.msi' -o -name '*.exe' -o -name '*.dmg' -o -name '*.deb' \) -print0
          )
          assets+=("dist/SHA256SUMS.txt")

          gh release create "$GITHUB_REF_NAME" "${assets[@]}" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --title "Camunda Support ${GITHUB_REF_NAME#v}" \
            --generate-notes \
            --notes "Windows x64, macOS ARM64 and Ubuntu x64 installers. Packages are unsigned."
